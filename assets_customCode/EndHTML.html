<!-- Place the back button -->
<a id="back-button" href="javascript:history.back()" style="
    display: inline-flex; 
    align-items: center; 
    text-decoration: none; 
    color: #555; 
    font-family: sans-serif; 
    font-weight: 500;
    gap: 4px;
    font-size: 14px;

    /* Positioning logic */
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
    padding: 10px 10px;
    border-radius: 5px;
">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    
    <span>Back</span>
</a>

<!-- Hide it if we are on the root/main-page/install/select-event pages -->
<script>
    let path = window.location.pathname;
    if (path === "/" || path.includes("main-page") || path.includes("install") || path.includes("select-event")) {
        document.getElementById("back-button").style.display = "none";
    }
</script>
